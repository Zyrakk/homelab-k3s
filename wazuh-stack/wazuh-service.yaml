apiVersion: v1
kind: Service
metadata:
  name: wazuh-manager-agents
  namespace: wazuh
spec:
  type: NodePort
  selector:
    app: wazuh-manager
    node-type: master
  ports:
    - name: agent
      port: 1514
      targetPort: 1514
      nodePort: 31514
    - name: enrollment
      port: 1515
      targetPort: 1515
      nodePort: 31515
