---
# NUEVO: provisioning de alerting (contact point Telegram + reglas)
# El token y chat_id se inyectan como variables de entorno desde el Secret
# grafana-telegram (ver grafana-telegram-secret_yaml.example)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting
  namespace: monitoring
data:
  contactpoints.yaml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: telegram
        receivers:
          - uid: telegram-zcloud
            type: telegram
            settings:
              bottoken: $TELEGRAM_BOT_TOKEN
              chatid: "$TELEGRAM_CHAT_ID"
            disableResolveMessage: false
    policies:
      - orgId: 1
        receiver: telegram
        group_by: ["alertname"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
  rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: zcloud-alerts
        folder: ZCloud Alerts
        interval: 1m
        rules:
          - uid: zcloud-node-down
            title: Nodo caido
            condition: C
            for: 2m
            noDataState: Alerting
            execErrState: Alerting
            labels:
              severity: critical
            annotations:
              summary: "Nodo {{ $labels.instance }} caido (node-exporter no responde)"
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: victoriametrics
                model:
                  expr: up{job="node-exporter"}
                  instant: true
                  refId: A
              - refId: C
                relativeTimeRange: { from: 0, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  refId: C
                  conditions:
                    - evaluator: { params: [1], type: lt }
                      operator: { type: and }
                      query: { params: [] }
                      reducer: { type: last }
                      type: query
          - uid: zcloud-monitoring-down
            title: Componente de monitoring caido
            condition: C
            for: 5m
            noDataState: Alerting
            execErrState: Alerting
            labels:
              severity: critical
            annotations:
              summary: "{{ $labels.job }} ({{ $labels.instance }}) caido"
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: victoriametrics
                model:
                  expr: up{job=~"victoriametrics|loki|kube-state-metrics"}
                  instant: true
                  refId: A
              - refId: C
                relativeTimeRange: { from: 0, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  refId: C
                  conditions:
                    - evaluator: { params: [1], type: lt }
                      operator: { type: and }
                      query: { params: [] }
                      reducer: { type: last }
                      type: query
          - uid: zcloud-disk-full
            title: Disco raiz por encima del 85%
            condition: C
            for: 10m
            noDataState: NoData
            execErrState: Error
            labels:
              severity: warning
            annotations:
              summary: "Disco / en {{ $labels.instance }} al {{ $values.A }}%"
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: victoriametrics
                model:
                  expr: 100 - ((node_filesystem_avail_bytes{job="node-exporter",mountpoint="/",fstype!~"rootfs|tmpfs"} / node_filesystem_size_bytes{job="node-exporter",mountpoint="/",fstype!~"rootfs|tmpfs"}) * 100)
                  instant: true
                  refId: A
              - refId: C
                relativeTimeRange: { from: 0, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  refId: C
                  conditions:
                    - evaluator: { params: [85], type: gt }
                      operator: { type: and }
                      query: { params: [] }
                      reducer: { type: last }
                      type: query
          - uid: zcloud-inodes-full
            title: Inodos por encima del 85%
            condition: C
            for: 10m
            noDataState: NoData
            execErrState: Error
            labels:
              severity: warning
            annotations:
              summary: "Inodos de / en {{ $labels.instance }} al {{ $values.A }}%"
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: victoriametrics
                model:
                  expr: 100 - ((node_filesystem_files_free{job="node-exporter",mountpoint="/",fstype!~"rootfs|tmpfs"} / node_filesystem_files{job="node-exporter",mountpoint="/",fstype!~"rootfs|tmpfs"}) * 100)
                  instant: true
                  refId: A
              - refId: C
                relativeTimeRange: { from: 0, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  refId: C
                  conditions:
                    - evaluator: { params: [85], type: gt }
                      operator: { type: and }
                      query: { params: [] }
                      reducer: { type: last }
                      type: query
          - uid: zcloud-mem-high
            title: Memoria de nodo por encima del 90%
            condition: C
            for: 10m
            noDataState: NoData
            execErrState: Error
            labels:
              severity: warning
            annotations:
              summary: "Memoria en {{ $labels.instance }} al {{ $values.A }}%"
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: victoriametrics
                model:
                  expr: (1 - (node_memory_MemAvailable_bytes{job="node-exporter"} / node_memory_MemTotal_bytes{job="node-exporter"})) * 100
                  instant: true
                  refId: A
              - refId: C
                relativeTimeRange: { from: 0, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  refId: C
                  conditions:
                    - evaluator: { params: [90], type: gt }
                      operator: { type: and }
                      query: { params: [] }
                      reducer: { type: last }
                      type: query
          - uid: zcloud-crashloop
            title: Pod reiniciando en bucle
            condition: C
            for: 5m
            noDataState: OK
            execErrState: Error
            labels:
              severity: warning
            annotations:
              summary: "{{ $labels.namespace }}/{{ $labels.pod }} ha reiniciado {{ $values.A }} veces en 15m"
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: victoriametrics
                model:
                  expr: sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total[15m]))
                  instant: true
                  refId: A
              - refId: C
                relativeTimeRange: { from: 0, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  refId: C
                  conditions:
                    - evaluator: { params: [2], type: gt }
                      operator: { type: and }
                      query: { params: [] }
                      reducer: { type: last }
                      type: query
          - uid: zcloud-deploy-degraded
            title: Deployment degradado
            condition: C
            for: 10m
            noDataState: OK
            execErrState: Error
            labels:
              severity: warning
            annotations:
              summary: "{{ $labels.namespace }}/{{ $labels.deployment }} tiene replicas no disponibles"
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: victoriametrics
                model:
                  expr: kube_deployment_spec_replicas - kube_deployment_status_replicas_available
                  instant: true
                  refId: A
              - refId: C
                relativeTimeRange: { from: 0, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  refId: C
                  conditions:
                    - evaluator: { params: [0], type: gt }
                      operator: { type: and }
                      query: { params: [] }
                      reducer: { type: last }
                      type: query
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
      containers:
        - name: grafana
          image: grafana/grafana:12.3.1
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-credentials
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-credentials
                  key: admin-password
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "https://grafana.zyrak.cloud"
            - name: GF_INSTALL_PLUGINS
              value: "grafana-clock-panel,grafana-piechart-panel"
            # NUEVO: credenciales de Telegram para el contact point de alerting
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: grafana-telegram
                  key: bot-token
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: grafana-telegram
                  key: chat-id
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: alerting
              mountPath: /etc/grafana/provisioning/alerting
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-providers
          configMap:
            name: grafana-dashboard-providers
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: alerting
          configMap:
            name: grafana-alerting
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
